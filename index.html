<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista, która się wydarzy</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fefefe;
      color: #333;
      padding: 40px;

      margin: auto;
    }
    h1 { text-align: center; margin-bottom: 10px; }
    p { text-align: center; font-style: italic; color: #555; }
    .cel { border: 1px solid #ccc; padding: 15px; margin: 15px 0; border-radius: 8px; }
    .cel a { color: #0070f3; text-decoration: none; }
    .cel a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Lista, która się wydarzy</h1>
  <p>Mój osobisty pamiętnik celów – wypełni się z czasem.</p>

  <div class="cel">
    <strong>Zostać strażakiem PSP</strong><br>
    Status: W trakcie<br>
    Data rozpoczęcia: 2026<br>
    <a href="#">Zobacz drogę</a>
  </div>

  <div class="cel">
    <strong>Inne marzenie</strong><br>
    Status: ⏳ Niezrobione<br>
    <a href="#">Zobacz drogę</a>
  </div>
</body>
</html>
