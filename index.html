<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista, która się wydarzy</title>

<!-- Czcionka EB Garamond z Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: Arial, sans-serif;
  background:#f4f4f4;
  color:#222;
}

/* ===== HEADER ===== */
header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:80px;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
  z-index:1000;
}

/* EB Garamond dla nagłówka */
header h1{
  font-family: 'EB Garamond', serif;
  font-size:1.9rem;
  font-weight:700;
}

/* ===== HAMBURGER ===== */
.hamburger{
  position:absolute;
  left:20px;
  cursor:pointer;
  width:30px;
  height:22px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.hamburger div{
  height:3px;
  background:#222;
  border-radius:2px;
}

/* ===== PANEL MENU ===== */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  display:none;
  z-index:998;
}

.side-panel{
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:#fff;
  box-shadow:2px 0 10px rgba(0,0,0,0.2);
  padding:100px 20px 40px 20px;
  transition:0.3s;
  z-index:999;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.side-panel a{
  text-decoration:none;
  color:#222;
  font-weight:500;
  margin-bottom:20px;
  display:block;
}

.side-panel a:hover{
  color:#0077cc;
}

.panel-bottom{
  border-top:1px solid #ddd;
  padding-top:20px;
  margin-top:20px;
}

/* ===== SEKCJA O MNIE ===== */
section.about{
  padding-top:200px;
  padding-bottom:60px;
  text-align:center;
}

section.about img{
  width:210px;
  height:210px;
  border-radius:50%;
  object-fit:cover;
  object-position:center;
  margin-top:20px;
  margin-bottom:30px;
  box-shadow:0 15px 40px rgba(0,0,0,0.35);
  border:4px solid #111;
}

section.about p{
  max-width:620px;
  margin:auto;
  font-size:1rem;
  line-height:1.6;
  padding:0 10px;
}

/* ===== LISTA ===== */
section.list{
  display:none;
  padding-top:160px;
  padding-left:20px;
  padding-right:20px;
  max-width:800px;
  margin:auto;
}

.dream{
  background:#fff;
  padding:20px;
  margin-bottom:15px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
  font-size:1.05rem;
}

/* ===== CYTATY ===== */
section.quotes{
  display:none;
  padding-top:160px;
  padding-left:20px;
  padding-right:20px;
  max-width:800px;
  margin:auto;
}

.quote{
  background:#fff;
  padding:15px 20px;
  margin-bottom:10px;
  border-left:4px solid #0077cc;
  border-radius:4px;
  font-style:italic;
}

/* RESPONSYWNOŚĆ */
@media(max-width:600px){
  section.about{
    padding-top:220px;
  }

  section.about img{
    width:180px;
    height:180px;
  }

  section.list,
  section.quotes{
    padding-top:180px;
  }

  header h1{
    font-size:1.6rem;
  }
}
</style>
</head>

<body>

<header>
  <div class="hamburger" id="hamburger">
    <div></div>
    <div></div>
    <div></div>
  </div>
  <h1>Lista, która się wydarzy</h1>
</header>

<div class="overlay" id="overlay"></div>

<div class="side-panel" id="panel">
  <div>
    <a href="#about">O mnie</a>
    <a href="#dreamList">Lista marzeń</a>
    <a href="#quotes">Cytaty</a>
  </div>

  <div class="panel-bottom">
    <a href="https://instagram.com/" target="_blank">Instagram</a>
    <a href="https://facebook.com/" target="_blank">Facebook</a>
    <a href="#">zzz</a>
  </div>
</div>

<section class="about" id="about">
  <img src="IMG_8660.jpeg" alt="Moje zdjęcie">
  <p>
    Tu możesz wpisać swój opis — kim jesteś, co robisz, co budujesz. 
    To jest Twoje miejsce w internecie.
  </p>
  <br>
  <button onclick="toggleList()">Zobacz listę</button>
</section>

<section class="list" id="dreamList">
  <div class="dream">1</div>
  <div class="dream">2</div>
</section>

<section class="quotes" id="quotes">
  <div class="quote">Cytat 1</div>
  <div class="quote">Cytat 2</div>
</section>

<script>
const hamburger = document.getElementById("hamburger");
const panel = document.getElementById("panel");
const overlay = document.getElementById("overlay");

hamburger.addEventListener("click", ()=>{
  panel.style.left="0";
  overlay.style.display="block";
});

overlay.addEventListener("click", ()=>{
  panel.style.left="-260px";
  overlay.style.display="none";
});

function toggleList(){
  const list=document.getElementById("dreamList");
  const quotes=document.getElementById("quotes");
  list.style.display=list.style.display==="block"?"none":"block";
  quotes.style.display="none";
}
</script>

</body>
</html>
