<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista, która się wydarzy</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: Arial, sans-serif;
  background:#f4f4f4;
  color:#222;
}

/* ===== HEADER ===== */
header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:80px;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
  z-index:1000;
}

header h1{
  font-size:1.6rem;
}

/* ===== HAMBURGER ===== */
.hamburger{
  position:absolute;
  left:20px;
  cursor:pointer;
  width:30px;
  height:22px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.hamburger div{
  height:3px;
  background:#222;
  border-radius:2px;
}

/* ===== PANEL MENU ===== */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  display:none;
  z-index:998;
}

.side-panel{
  position:fixed;
  top:0;
  left:-260px;
  width:260px;
  height:100%;
  background:#fff;
  box-shadow:2px 0 10px rgba(0,0,0,0.2);
  padding:100px 20px 40px 20px;
  transition:0.3s;
  z-index:999;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.side-panel a{
  text-decoration:none;
  color:#222;
  font-weight:500;
  margin-bottom:20px;
  display:block;
}

.side-panel a:hover{
  color:#0077cc;
}

.panel-bottom{
  border-top:1px solid #ddd;
  padding-top:20px;
  margin-top:20px;
}

/* ===== SEKCJA O MNIE ===== */
section.about{
  padding-top:180px;   /* DUŻO miejsca od góry */
  padding-bottom:60px;
  text-align:center;
}

section.about img{
  width:160px;
  height:160px;
  border-radius:50%;
  object-fit:cover;
  margin-top:40px;  /* jeszcze niżej zdjęcie */
  margin-bottom:20px;
}

/* ===== LISTA ===== */
section.list{
  display:none;
  padding-top:140px;  /* żeby nie zachodziło */
  padding-left:20px;
  padding-right:20px;
  max-width:800px;
  margin:auto;
}

.dream{
  background:#fff;
  padding:20px;
  margin-bottom:15px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

/* RESPONSYWNOŚĆ */
@media(max-width:600px){
  section.about{
    padding-top:200px;
  }

  section.list{
    padding-top:160px;
  }
}
</style>
</head>

<body>

<header>
  <div class="hamburger" id="hamburger">
    <div></div>
    <div></div>
    <div></div>
  </div>
  <h1>Lista, która się wydarzy</h1>
</header>

<div class="overlay" id="overlay"></div>

<div class="side-panel" id="panel">
  <div>
    <a href="#about">O mnie</a>
    <a href="#dreamList">Lista marzeń</a>
    <a href="#quotes">Cytaty</a>
  </div>

  <div class="panel-bottom">
    <a href="https://instagram.com/" target="_blank">Instagram</a>
    <a href="https://facebook.com/" target="_blank">Facebook</a>
    <a href="#">zzz</a>
  </div>
</div>

<section class="about" id="about">
  <img src="https://via.placeholder.com/160" alt="Twoje zdjęcie">
  <p>Tu możesz wpisać swój opis. Kim jesteś. Co robisz. Co budujesz.</p>
  <br>
  <button onclick="toggleList()">Zobacz listę</button>
</section>

<section class="list" id="dreamList">
  <div class="dream">
    1
  </div>

  <div class="dream">
    2
  </div>
</section>

<script>
const hamburger = document.getElementById("hamburger");
const panel = document.getElementById("panel");
const overlay = document.getElementById("overlay");

hamburger.addEventListener("click", ()=>{
  panel.style.left="0";
  overlay.style.display="block";
});

overlay.addEventListener("click", ()=>{
  panel.style.left="-260px";
  overlay.style.display="none";
});

function toggleList(){
  const list=document.getElementById("dreamList");
  list.style.display=list.style.display==="block"?"none":"block";
}
</script>

</body>
</html>
