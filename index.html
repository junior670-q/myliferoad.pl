<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista, która się wydarzy...</title>
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #f5f5f5;
      color: #222;
      line-height: 1.6;
    }

    /* Stały nagłówek */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background-color: #fff;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      z-index: 1000;
    }

    header h1 {
      font-size: 2rem;
      margin-bottom: 5px;
    }

    header p {
      font-size: 1rem;
      color: #555;
      transition: opacity 0.3s;
    }

    /* Sekcja o mnie */
    section.about {
      padding: 150px 20px 50px; /* uwzględnia nagłówek */
      text-align: center;
    }

    section.about img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      margin-bottom: 20px;
      object-fit: cover;
    }

    section.about p {
      max-width: 600px;
      margin: 0 auto 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 1rem;
      border: none;
      background-color: #0077cc;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #005fa3;
    }

    /* Lista marzeń */
    section.list {
      display: none; /* początkowo ukryta */
      padding: 50px 20px;
      max-width: 800px;
      margin: 0 auto;
    }

    .dream {
      background-color: #fff;
      padding: 20px;
      margin-bottom: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .dream .info {
      max-width: 70%;
    }

    .dream h3 {
      margin-bottom: 5px;
      font-size: 1.2rem;
    }

    .dream .meta {
      font-size: 0.9rem;
      color: #555;
    }

    .dream button {
      margin-left: 10px;
      background-color: #28a745;
    }

    .dream button:hover {
      background-color: #1e7e34;
    }
  </style>
</head>
<body>

  <!-- Nagłówek -->
  <header>
    <h1>Lista, która się wydarzy…</h1>
    <p id="subtitle">Marzenia się nie spełniają. Marzenia się spełnia</p>
  </header>

  <!-- Sekcja o mnie -->
  <section class="about">
    <img src="https://via.placeholder.com/150" alt="Twoje zdjęcie">
    <p>Cześć! Nazywam się [Twoje imię], jestem [krótki opis]. Tutaj zapisuję moje marzenia i osiągnięcia.</p>
    <button id="showListBtn">Zobacz listę</button>
  </section>

  <!-- Lista marzeń -->
  <section class="list" id="dreamList">
    <div class="dream">
      <div class="info">
        <h3>🔥 Zostać strażakiem PSP</h3>
        <div class="meta">Osiągnięte: 2026-03-15</div>
      </div>
      <button>Galeria</button>
    </div>

    <div class="dream">
      <div class="info">
        <h3>🏍️ Przejechać trasę marzeń motocyklem</h3>
        <div class="meta">Nie osiągnięte</div>
      </div>
      <button>Galeria</button>
    </div>
  </section>

  <script>
    const btn = document.getElementById('showListBtn');
    const list = document.getElementById('dreamList');

    btn.addEventListener('click', () => {
      list.style.display = list.style.display === 'block' ? 'none' : 'block';
      list.scrollIntoView({behavior: "smooth"});
    });

    // Opcjonalnie – schowanie cytatu przy scrollu
    const subtitle = document.getElementById('subtitle');
    window.addEventListener('scroll', () => {
      if(window.scrollY > 50) {
        subtitle.style.opacity = 0;
      } else {
        subtitle.style.opacity = 1;
      }
    });
  </script>

</body>
</html>
